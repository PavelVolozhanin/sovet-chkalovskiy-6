<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совет МКД Чкаловский 6</title>
    
    <!-- ИСПРАВЛЕННЫЕ ССЫЛКИ НА СТИЛИ -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        :root { --primary: #0056b3; --tg-color: #0088cc; }
        body { background-color: #f4f7f9; font-family: 'Inter', sans-serif; margin: 0; }
        h1, h2, .tg-button { font-family: 'Montserrat', sans-serif; }
        
        .hero {
            background: linear-gradient(135deg, #0056b3 0%, #0088cc 100%);
            color: white; padding: 40px 20px 80px; text-align: center;
        }
        .hero h1 { color: white; margin: 0; font-size: 2rem; }

        main { 
            background: white; padding: 25px; border-radius: 16px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
            margin: -40px auto 40px; max-width: 900px;
            position: relative; z-index: 10;
        }

        .alert-card {
            border-left: 6px solid #d9534f; background: #fff5f5;
            padding: 15px; border-radius: 10px; margin-bottom: 25px;
        }

        .contact-box { border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; }
        
        /* Кнопка ТГ с фиксом для мобильных */
        .tg-button { 
            background-color: var(--tg-color) !important; 
            color: white !important;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; text-decoration: none; padding: 15px;
            border-radius: 8px; font-weight: bold; width: 100%;
        }

        .map-container {
            border-radius: 12px; overflow: hidden; height: 350px;
            border: 1px solid #e2e8f0; margin-top: 20px;
        }
        
        iframe { width: 100%; height: 100%; border: 0; }
        @media (min-width: 768px) { .grid-custom { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } .map-container { margin-top: 0; } }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Чкаловский бульвар, 6</h1>
        <p>Портал Совета МКД</p>
    </header>

    <main class="container">
        <section>
            <div class="alert-card">
                <h4 style="color: #d9534f; margin: 0 0 10px;">⚡️ Важное сообщение</h4>
                <p style="margin: 0;">Проводится ОСС с 24.03.2026 по 07.04.2026.</p>
            </div>
        </section>

        <section class="grid-custom">
            <div class="contact-box">
                <h3 style="margin-top: 0;">📞 Контакты</h3>
                <p>📍 <b>Адрес:</b><br>Москва, Чкаловский б-р, 6</p>
                <p><b>Диспетчер:</b><br><a href="tel:84955058989">8 495 505-89-89</a></p>
                
                <!-- ПРОВЕРЕННАЯ ССЫЛКА НА ТЕЛЕГРАМ -->
                <a href="https://t.me" target="_blank" rel="noopener noreferrer" class="tg-button">
                    <i class="fab fa-telegram-plane"></i> Вступить в чат
                </a>
            </div>

            <div class="map-container">
                <!-- РАБОЧАЯ КАРТА -->
                <script type="text/javascript" charset="utf-8" async src="https://api-maps.yandex.ru"></script>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding-bottom: 20px; color: #888;">
        <small>&copy; 2026 Совет МКД "Чкаловский 6"</small>
    </footer>

</body>
</html>
