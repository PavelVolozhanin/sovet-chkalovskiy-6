<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совет МКД Чкаловский 6</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #007bc1; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .header { color: white; text-align: center; padding: 40px 20px; }
        .header h1 { margin: 0; font-size: 28px; }
        .main-card {
            background: white; width: 95%; max-width: 900px;
            border-radius: 12px; padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .alert-box {
            background: #fff5f5; border-left: 5px solid #d9534f;
            padding: 15px; border-radius: 8px; margin-bottom: 20px;
        }
        .alert-box h4 { color: #d9534f; margin: 0 0 5px 0; }
        .content-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .contact-info { flex: 1 1 300px; padding: 15px; background: #f9f9f9; border-radius: 10px; }
        .map-box { flex: 1 1 300px; height: 350px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .tg-button {
            display: block; background: #0088cc; color: white !important;
            text-align: center; text-decoration: none; padding: 14px;
            border-radius: 8px; font-weight: bold; margin-top: 20px;
        }
        footer { color: rgba(255,255,255,0.7); padding-bottom: 20px; font-size: 12px; }
        iframe { width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Чкаловский бульвар, 6</h1>
        <p>Портал Совета МКД</p>
    </div>
    <div class="main-card">
        <div class="alert-box">
            <h4>Важное сообщение</h4>
            <p>Уважаемые жильцы! Проводится ОСС с 24.03.2026 по 07.04.2026.</p>
        </div>
        <div class="content-grid">
            <div class="contact-info">
                <h3 style="margin-top:0">Контакты</h3>
                <p>📍 <b>Адрес:</b><br>Москва, Чкаловский б-р, 6</p>
                <p>📞 <b>Диспетчер:</b><br><a href="tel:84955058989" style="font-size: 1.1em; font-weight: bold; color: #0056b3;">8 495 505-89-89</a></p>
                <a href="https://t.me" target="_blank" class="tg-button">✈️ Вступить в чат</a>
            </div>
            <div class="map-box">
                <!-- Прямая ссылка на карту без лишних скриптов -->
                <iframe src="https://yandex.ru" allowfullscreen="true"></iframe>
            </div>
        </div>
    </div>
    <footer>&copy; 2026 Совет МКД "Чкаловский 6"</footer>
</body>
</html>
