<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совет МКД Чкаловский 6</title>
    
    <!-- ПОЛНЫЕ РАБОЧИЕ ССЫЛКИ -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        :root { --primary: #0056b3; --tg-color: #0088cc; }
        
        body { 
            background-color: #007bc1; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .header { color: white; text-align: center; padding: 50px 20px 80px; }
        .header h1 { font-family: 'Montserrat', sans-serif; margin: 0; font-size: 2.2rem; color: white !important; }

        main { 
            background: white; width: 95%; max-width: 1000px;
            border-radius: 20px; padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            margin-top: -50px; margin-bottom: 50px;
            position: relative; z-index: 10;
        }

        .alert-card {
            border-left: 6px solid #d9534f; background: #fff5f5;
            padding: 20px; border-radius: 12px; margin-bottom: 30px;
        }

        /* Адаптивная сетка: на ПК 2 колонки, на телефоне 1 */
        .content-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        .contact-box { 
            border: 1px solid #e2e8f0; padding: 25px; 
            border-radius: 15px; background: #fcfcfc; 
        }
        
        .tg-button { 
            background-color: var(--tg-color) !important; 
            color: white !important;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; text-decoration: none; padding: 18px;
            border-radius: 12px; font-weight: bold; width: 100%;
            transition: transform 0.2s, filter 0.2s; border: none;
            font-family: 'Montserrat', sans-serif;
        }
        .tg-button:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .map-container {
            border-radius: 15px; overflow: hidden; height: 400px;
            border: 1px solid #e2e8f0;
        }
        iframe { width: 100%; height: 100%; border: 0; }
        
        footer { color: rgba(255,255,255,0.6); padding-bottom: 30px; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <header class="header">
        <h1>Чкаловский бульвар, 6</h1>
        <p>Портал Совета МКД</p>
    </header>

    <main class="container">
        <!-- Объявление -->
        <div class="alert-card">
            <h4 style="color: #d9534f; margin-bottom: 10px; font-family: 'Montserrat';">⚡️ Важное сообщение</h4>
            <p style="margin: 0; color: #333;">Уважаемые жильцы! Проводится ОСС с 24.03.2026 по 07.04.2026. Просим принять участие.</p>
        </div>

        <div class="content-grid">
            <!-- Контакты -->
            <div class="contact-box">
                <h3 style="margin-top: 0; color: #333; font-family: 'Montserrat';">📞 Контакты</h3>
                <p>📍 <b>Адрес:</b><br>Москва, Чкаловский б-р, 6</p>
                <p>🆘 <b>Диспетчер:</b><br>
                <a href="tel:84955058989" style="font-size: 1.2rem; font-weight: bold; color: var(--primary); text-decoration: none;">8 495 505-89-89</a></p>
                
                <a href="https://t.me" target="_blank" rel="noopener noreferrer" class="tg-button">
                    <i class="fab fa-telegram-plane"></i> ВСТУПИТЬ В ЧАТ
                </a>
            </div>

            <!-- Карта -->
            <div class="map-container">
                <iframe src="https://yandex.ru" allowfullscreen="true"></iframe>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Совет МКД "Чкаловский 6"
    </footer>

</body>
</html>
