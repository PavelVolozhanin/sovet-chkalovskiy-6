<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совет МКД Чкаловский 6</title>
    
    <!-- Подключаем шрифты и иконки через надежные CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        :root { --primary: #0056b3; --tg-color: #0088cc; }
        
        * { box-sizing: border-box; }
        
        body { 
            background-color: #007bc1; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .header { color: white; text-align: center; padding: 40px 20px; }
        .header h1 { font-family: 'Montserrat', sans-serif; margin: 0; font-size: 2.2rem; }

        .main-card {
            background: white; width: 95%; max-width: 1000px;
            border-radius: 16px; padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        .alert-box {
            background: #fff5f5; border-left: 6px solid #d9534f;
            padding: 20px; border-radius: 12px; margin-bottom: 30px;
        }
        .alert-box h4 { color: #d9534f; margin: 0 0 8px 0; font-family: 'Montserrat', sans-serif; }

        /* Адаптивная сетка */
        .content-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
        }

        /* Если экран узкий (телефон) — колонки в один ряд */
        @media (max-width: 768px) {
            .content-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
        }

        .contact-info { 
            background: #fcfcfc; border: 1px solid #eee; 
            padding: 25px; border-radius: 15px; 
        }

        .tg-button {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--tg-color); color: white !important;
            text-decoration: none; padding: 16px; border-radius: 10px;
            font-weight: bold; margin-top: 25px; transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
        }
        .tg-button:hover { background: #0077b5; transform: translateY(-2px); }

        .map-box { 
            height: 400px; border-radius: 15px; overflow: hidden; 
            border: 1px solid #eee; position: relative; 
        }
        
        iframe { width: 100%; height: 100%; border: 0; }
        
        footer { color: rgba(255,255,255,0.6); padding-bottom: 30px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Чкаловский бульвар, 6</h1>
        <p>Портал Совета МКД</p>
    </div>

    <main class="main-card">
        <!-- Блок новости -->
        <div class="alert-box">
            <h4><i class="fas fa-exclamation-circle"></i> Важное сообщение</h4>
            <p>Уважаемые жильцы! Проводится ОСС с 24.03.2026 по 07.04.2026. Просим принять участие в голосовании.</p>
        </div>

        <div class="content-grid">
            <!-- Блок контакты -->
            <div class="contact-info">
                <h3 style="margin-top:0; font-family: 'Montserrat';"><i class="fas fa-info-circle"></i> Контакты</h3>
                <p><i class="fas fa-map-marker-alt" style="color:red"></i> <b>Адрес:</b><br>г. Москва, Чкаловский б-р, 6</p>
                <p><i class="fas fa-phone-alt" style="color:green"></i> <b>Диспетчер (24/7):</b><br>
                <a href="tel:84955058989" style="font-size: 1.2rem; font-weight: bold; color: var(--primary);">8 495 505-89-89</a></p>
                
                <a href="https://t.me" target="_blank" rel="noopener" class="tg-button">
                    <i class="fab fa-telegram-plane"></i> Вступить в чат жильцов
                </a>
            </div>

            <!-- Блок карта -->
            <div class="map-box">
                <iframe src="https://yandex.ru" allowfullscreen="true"></iframe>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Совет МКД "Чкаловский 6"
    </footer>

</body>
</html>
